services:
  hono-api:
    build:
      context: .
      dockerfile: hono-api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - DB_FILE_NAME=file:local.db
      - DATABASE_URL=file:./dev.db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/hono-api/node_modules
    command: >
      sh -c "
        pnpm exec prisma migrate deploy &&
        pnpm exec drizzle-kit migrate &&
        pnpm seed:prisma &&
        pnpm seed:drizzle &&
        pnpm dev
      "
  nextjs:
    build:
      context: .
      dockerfile: nextjs/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - HONO_API_URL=http://hono-api:3001
    volumes:
      - .:/app
      - /app/node_modules
      - /app/nextjs/node_modules
    depends_on:
      - hono-api
